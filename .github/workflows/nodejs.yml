name: Node CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: ".node-version"
          cache: npm
      - run: npm ci
      - run: npm run lint

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: ".node-version"
          cache: npm
      - run: npm ci
      - run: npm run test:unit
      - run: npm install -g web-ext # build tool
      - run: npm run package-chrome
      - run: npm run package-firefox-mv3

  playwright:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-noble
    steps:
      - uses: actions/checkout@v6
      - name: Install clipboard dependencies
        run: |
          apt-get update && apt-get install -y xsel
      - name: Use Node.js
        # Resolves .node-version (Node 24), matching the Node 24 shipped by the
        # playwright container image above and the Docker e2e harness — keeps the
        # e2e runtime identical across CI and local docker runs.
        uses: actions/setup-node@v5
        with:
          node-version-file: ".node-version"
          cache: npm
      - run: npm ci
      - name: Run Vitest UI tests in browser
        run: npm run test:browser
      - name: Run Playwright tests
        # Shared with the Docker harness so the xvfb invocation (screen geometry,
        # RANDR) stays identical across CI and local docker runs. See
        # docker/playwright-ci/run-playwright.sh and DEVELOPMENT.md (E2E tests).
        run: bash docker/playwright-ci/run-playwright.sh
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  selenium:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: ".node-version"
          cache: npm
      - run: npm ci
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y firefox xvfb xsel
      - name: Use Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Build test extensions
        run: npm run test:e2e:build
      - name: Run Selenium Firefox e2e tests
        run: xvfb-run -a --server-args="-screen 0 1280x720x24 -ac +extension RANDR" pytest e2e_test/ -v
